<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title & logo -->
    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- style css link -->
    <link rel="stylesheet" href="./style/style.css">
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <!-- navbar design -->
        <nav class="bg-white shadow-md px-12 py-4 flex justify-between items-center">
            <!-- left side -->
            <div class="flex items-center gap-2">
                <img class="w-9 h-9" src="./assets/github-logo.png" alt="">
                <h2 class="text-lg font-semibold text-gray-800">GitHub Issues Tracker</h2>
            </div>
            <!-- right side -->
            <div class="flex items-center gap-3">
                <!-- search -->
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <!-- button -->
                <button class="btn btn-active btn bg-blue-700 text-white hover:bg-blue-800 transition "> + New
                    Issue</button>
            </div>
        </nav>
    </header>
    <main>

    </main>
    <footer>

    </footer>
</body>

</html>
