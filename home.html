<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title & logo -->
    <title>Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- style css link -->
    <link rel="stylesheet" href="./style/style.css">
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <!-- navbar design -->
        <nav
            class="bg-white max-w-8xl shadow-md px-12 py-4 flex flex-col md:flex-row md:justify-between md:items-center">
            <!-- left side -->
            <div class="flex items-center gap-2">
                <img class="w-9 h-9" src="./assets/github-logo.png" alt="">
                <h2 class="text-lg font-semibold text-gray-800">GitHub Issues Tracker</h2>
            </div>
            <!-- right side -->
            <div class="flex flex-col md:flex-row md:items-center gap-3">
                <!-- search -->
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <!-- button -->
                <button class="btn btn-active btn bg-blue-700 text-white hover:bg-blue-800 transition "> + New
                    Issue</button>
            </div>
        </nav>
    </header>
    <main class="bg-gray-50">
        <!-- tabs -->
        <div class="max-w-7xl mx-auto p-10">
            <div class="flex flex-col md:flex-row gap-4 p-4 border-b-0 shadow-md bg-white">
                <button onclick="toggleStyle('all-btn')" id="all-btn"
                    class="bg-blue-600 text-white px-6 py-4 rounded-md text-sm">All</button>
                <button onclick="toggleStyle('open-btn')" id="open-btn"
                    class="bg-gray-200  px-6 py-4 rounded-md text-sm">Open</button>
                <button onclick="toggleStyle('closed-btn')" id="closed-btn"
                    class="bg-gray-200 px-6 py-4 rounded-md text-sm">Closed</button>
            </div>
        </div>


        <!-- filtered card -->
        <section id="filtered-section" class="hidden">

        </section>

        <!-- Issues part -->
        <div class="max-w-7xl mx-auto px-10 py-4">
            <div class="p-4 border-b-0 shadow-md bg-white">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Aperture.png" alt="">
                        <div>
                            <h2 class="font-semibold text-gray-800">50 Issues</h2>
                            <p class="md:text-sm text-gray-500">Track and manage your projects issues</p>
                        </div>
                    </div>
                    <div class="flex gap-3 text-md text-gray-600">
                        <span>Open</span>
                        <span>Close</span>
                    </div>
                </div>
            </div>
            <!-- card -->
            <div id="cardContainer" class="bg-gray-100 p-10 grid grid-cols-1 lg:grid-cols-4 md:grid-cols-3 gap-2"></div>
        </div>

    </main>



    <footer>

    </footer>

    <script src="./scripts/cards.js"></script>
</body>

</html>
